<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taunggyi Community Hub</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2991/2991201.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root { 
            --primary: #2563eb; 
            --primary-light: #eff6ff;
            --bg: #f1f5f9; 
            --card: #ffffff; 
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --green: #10b981;
            --red: #ef4444;
            --orange: #f59e0b;
        }

        * { box-sizing: border-box; font-family: 'Inter', 'Pyidaungsu', sans-serif; }
        body { background: var(--bg); color: var(--text-dark); margin: 0; padding-bottom: 100px; line-height: 1.5; }

        /* Header UI */
        .header { background: linear-gradient(135deg, #2563eb, #1e40af); color: white; padding: 30px 20px; text-align: center; border-radius: 0 0 30px 30px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .header h1 { margin: 0; font-size: 1.75rem; font-weight: 700; letter-spacing: -0.5px; }
        .header p { margin: 5px 0 0; opacity: 0.9; font-size: 0.95rem; }

        /* User Counter Badge */
        .active-badge { display: inline-flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.2); backdrop-filter: blur(10px); color: white; padding: 6px 14px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; margin-top: 15px; border: 1px solid rgba(255,255,255,0.3); }

        .container { max-width: 600px; margin: 0 auto; padding: 0 15px; }

        /* Telegram Button UX */
        .tg-section { margin: 20px 0; text-align: center; }
        .tg-btn { background: #0088cc; color: white; text-decoration: none; padding: 14px 28px; border-radius: 16px; display: inline-flex; align-items: center; gap: 10px; font-weight: 600; transition: transform 0.2s; box-shadow: 0 4px 12px rgba(0,136,204,0.3); }
        .tg-btn:active { transform: scale(0.95); }

        /* Modern Tabs */
        .tabs { display: flex; background: white; padding: 6px; border-radius: 20px; margin: 20px 0; position: sticky; top: 15px; z-index: 100; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); gap: 5px; }
        .tab { flex: 1; padding: 12px 5px; text-align: center; cursor: pointer; font-size: 0.85rem; font-weight: 600; border-radius: 15px; transition: 0.3s; color: var(--text-muted); }
        .tab.active { background: var(--primary); color: white; }

        /* Card UI */
        .card { background: var(--card); border-radius: 24px; padding: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); margin-bottom: 20px; position: relative; border: 1px solid rgba(0,0,0,0.03); }
        .badge { padding: 6px 14px; border-radius: 12px; font-size: 0.75rem; font-weight: 700; display: inline-block; margin-bottom: 12px; }
        .bg-green { background: #ecfdf5; color: var(--green); }
        .bg-red { background: #fef2f2; color: var(--red); }
        .bg-blue { background: #eff6ff; color: var(--primary); }

        .card-title { font-size: 1.15rem; font-weight: 700; margin: 0 0 8px 0; color: var(--text-dark); }
        .card-desc { font-size: 0.95rem; color: var(--text-muted); margin: 10px 0; line-height: 1.6; }
        .card-time { font-size: 0.8rem; color: #94a3b8; display: block; margin-top: 15px; }

        .post-img { width: 100%; border-radius: 18px; margin: 12px 0; object-fit: cover; max-height: 300px; }
        
        /* Action Buttons */
        .btn-call { background: var(--green); color: white; text-decoration: none; padding: 14px; border-radius: 16px; display: flex; align-items: center; justify-content: center; gap: 8px; font-weight: 700; margin-top: 15px; transition: 0.2s; }
        .btn-call:active { opacity: 0.8; }

        /* Floating Button */
        .fab { position: fixed; bottom: 30px; right: 25px; width: 60px; height: 60px; background: var(--primary); color: white; border-radius: 20px; border: none; font-size: 28px; box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.4); cursor: pointer; z-index: 999; display: flex; align-items: center; justify-content: center; }

        /* Modal UX */
        .modal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.5); backdrop-filter: blur(8px); align-items: flex-end; justify-content: center; z-index: 2000; }
        .modal-content { background: white; padding: 30px 25px; border-radius: 30px 30px 0 0; width: 100%; max-width: 500px; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        input, select, textarea { width: 100%; padding: 15px; margin: 12px 0; border: 1.5px solid #e2e8f0; border-radius: 16px; font-size: 1rem; outline: none; transition: 0.2s; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px var(--primary-light); }
    </style>
</head>
<body>

<div class="header">
    <h1>⛰️ Taunggyi Hub</h1>
    <p>တောင်ကြီးသားတို့အတွက် One-Stop Hub</p>
    <div class="active-badge">
        <span style="width: 8px; height: 8px; background: #4ade80; border-radius: 50%; display: inline-block;"></span>
        လက်ရှိ Online: <span id="activeUsers">...</span> ယောက်
    </div>
</div>

<div class="container">
    <div class="tg-section">
        <a href="https://t.me/+8WUdW0s-42AwY2U1" target="_blank" class="tg-btn">
            <img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png" width="20"> Telegram Group ဝင်ရန်
        </a>
    </div>

    <div class="tabs">
        <div class="tab active" onclick="switchTab('fuel', this)">⛽ ဆီ</div>
        <div class="tab" onclick="switchTab('lost', this)">🔍 ပျောက်/ကောက်</div>
        <div class="tab" onclick="switchTab('power', this)">💡 မီး</div>
        <div class="tab" onclick="switchTab('emergency', this)">☎️ အရေးပေါ်</div>
    </div>

    <div id="displayArea"></div>
</div>

<button class="fab" onclick="openModal()">+</button>

<div id="inputModal" class="modal">
    <div class="modal-content">
        <div style="width: 40px; height: 5px; background: #e2e8f0; border-radius: 10px; margin: -10px auto 20px;"></div>
        <h3 style="margin:0 0 10px; font-size: 1.3rem;">သတင်းအသစ်တင်မည်</h3>
        <div id="formFields"></div>
        <button onclick="saveData()" style="width:100%; background:var(--primary); color:white; padding:16px; border:none; border-radius:18px; font-weight:700; cursor:pointer; margin-top:10px;">တင်မည်</button>
        <button onclick="closeModal()" style="width:100%; background:none; border:none; color:var(--text-muted); padding:15px; cursor:pointer;">မတင်တော့ပါ</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCmsK55PSk5rYMIqvj8Xkadf1tFhkhsKxc",
        authDomain: "taunggyigasstation.firebaseapp.com",
        databaseURL: "https://taunggyigasstation-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "taunggyigasstation",
        storageBucket: "taunggyigasstation.firebasestorage.app",
        messagingSenderId: "206030659711",
        appId: "1:206030659711:web:6c320045e1db2c899a5f4a"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // User Presence (Active Count)
    const activeRef = db.ref("activeUsers/").push();
    db.ref(".info/connected").on("value", (snap) => {
        if (snap.val() === true) { activeRef.onDisconnect().remove(); activeRef.set(true); }
    });
    db.ref("activeUsers/").on("value", (snap) => {
        document.getElementById("activeUsers").innerText = snap.numChildren();
    });

    let currentTab = 'fuel';
    function switchTab(tab, el) {
        currentTab = tab;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        loadData();
    }

    function openModal() {
        if(currentTab === 'emergency') return alert("အရေးပေါ်နံပါတ်ကို Admin သာ တင်နိုင်သည်");
        const form = document.getElementById('formFields');
        if(currentTab === 'fuel') {
            form.innerHTML = `<input id="val1" placeholder="ဆိုင်အမည်"> <select id="val2"><option>ဆီရှိသည် ✅</option><option>ဆီပြတ်နေသည် ❌</option><option>တန်းစီနေဆဲ ⏳</option></select>`;
        } else if(currentTab === 'lost') {
            form.innerHTML = `<input id="val1" placeholder="ပစ္စည်းအမည်"><textarea id="val2" rows="3" placeholder="အသေးစိတ် နှင့် ဖုန်းနံပါတ်"></textarea><input id="valImg" placeholder="ပုံ Link (ImgBB)">`;
        } else if(currentTab === 'power') {
            form.innerHTML = `<input id="val1" placeholder="ရပ်ကွက်အမည်"> <select id="val2"><option>မီးလာနေသည် 💡</option><option>မီးပျက်နေသည် 🌑</option></select>`;
        }
        document.getElementById('inputModal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('inputModal').style.display = 'none'; }

    function saveData() {
        const v1 = document.getElementById('val1').value;
        const v2 = document.getElementById('val2').value;
        const vImg = document.getElementById('valImg')?.value || "";
        if(!v1 || !v2) return alert("အချက်အလက် ဖြည့်ပါ");
        const time = new Date().toLocaleString('en-US', { hour: 'numeric', minute: 'numeric', hour12: true, day: 'numeric', month: 'short' });
        let data = { title: v1, status: v2, img: vImg, time: time, timestamp: Date.now() };
        let path = currentTab === 'lost' ? 'lost/' : currentTab + '/' + v1;
        if(currentTab === 'lost') db.ref(path).push(data); else db.ref(path).set(data);
        closeModal();
    }

    function loadData() {
        const display = document.getElementById('displayArea');
        display.innerHTML = "<p style='text-align:center; padding:50px; opacity:0.5;'>Loading...</p>";
        
        if(currentTab === 'emergency') {
            display.innerHTML = `
                <div class="card"><div class="badge bg-red">SOS</div><div class="card-title">🚒 မီးသတ် (တောင်ကြီး)</div><a href="tel:08121222" class="btn-call">📞 Call 08121222</a></div>
                <div class="card"><div class="badge bg-blue">MED</div><div class="card-title">🚑 ပဏ္ဍိတရုံ လူမှုကူညီရေး</div><a href="tel:09428310111" class="btn-call">📞 Call 09428310111</a></div>`;
            return;
        }

        db.ref(currentTab + '/').on('value', snap => {
            display.innerHTML = "";
            let items = [];
            snap.forEach(child => { items.push(child.val()); });
            items.sort((a, b) => b.timestamp - a.timestamp);

            if(items.length === 0) display.innerHTML = "<p style='text-align:center; padding:50px; opacity:0.5;'>သတင်းမရှိသေးပါ</p>";

            items.forEach(d => {
                const s = d.status || "";
                const color = (s.includes('ရှိ') || s.includes('လာ')) ? 'bg-green' : (s.includes('ပြတ်') || s.includes('ပျက်') ? 'bg-red' : 'bg-blue');
                const phone = s.match(/\d+/);
                display.innerHTML += `
                    <div class="card">
                        <span class="badge ${color}">${currentTab === 'lost' ? 'သတင်း' : s}</span>
                        <div class="card-title">${d.title}</div>
                        ${d.img ? `<img src="${d.img}" class="post-img" onerror="this.style.display='none'">` : ''}
                        ${currentTab === 'lost' ? `<p class="card-desc">${s}</p>` : ''}
                        <span class="card-time">🕒 ${d.time || ''}</span>
                        ${(currentTab === 'lost' && phone) ? `<a href="tel:${phone[0]}" class="btn-call">📞 ဆက်သွယ်ရန်</a>` : ''}
                    </div>`;
            });
        });
    }
    window.onload = loadData;
</script>
</body>
</html>
