<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taunggyi Hub - Community</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --card: #ffffff; --text: #1e293b; }
        * { box-sizing: border-box; font-family: 'Segoe UI', 'Pyidaungsu', sans-serif; }
        body { background: var(--bg); color: var(--text); margin: 0; padding-bottom: 100px; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; background: white; font-size: 0.85rem; border-bottom: 1px solid #e2e8f0; }
        .user-chip { background: #f1f5f9; padding: 5px 12px; border-radius: 20px; color: var(--primary); font-weight: 600; }
        .header { background: linear-gradient(135deg, #2563eb, #1e40af); color: white; padding: 25px 20px; text-align: center; border-radius: 0 0 30px 30px; }
        .leaderboard { background: rgba(255,255,255,0.15); border-radius: 15px; padding: 12px; margin-top: 15px; font-size: 0.8rem; border: 1px solid rgba(255,255,255,0.2); }
        .container { max-width: 600px; margin: 0 auto; padding: 0 15px; }
        .tabs { display: flex; background: white; padding: 5px; border-radius: 18px; margin: 20px 0; position: sticky; top: 10px; z-index: 100; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .tab { flex: 1; padding: 12px; text-align: center; cursor: pointer; font-size: 0.85rem; font-weight: 700; border-radius: 14px; color: #64748b; }
        .tab.active { background: var(--primary); color: white; }
        .card { background: var(--card); border-radius: 24px; padding: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); margin-bottom: 20px; border: 1px solid rgba(0,0,0,0.02); }
        .card-title { font-size: 1.15rem; font-weight: 700; color: #0f172a; }
        .post-img { width: 100%; border-radius: 18px; margin: 12px 0; max-height: 350px; object-fit: cover; }
        .card-actions { border-top: 1px solid #f1f5f9; padding-top: 15px; display: flex; align-items: center; justify-content: space-between; }
        .like-btn { border: none; background: #f8fafc; padding: 8px 15px; border-radius: 10px; cursor: pointer; color: #64748b; font-weight: 700; display: flex; align-items: center; gap: 8px; transition: 0.2s; }
        .like-btn.liked { color: #ef4444; background: #fef2f2; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(15,23,42,0.6); backdrop-filter: blur(8px); align-items: center; justify-content: center; z-index: 2000; padding: 20px; }
        .modal-content { background: white; padding: 30px; border-radius: 28px; width: 100%; max-width: 400px; }
        input, select, textarea { width: 100%; padding: 14px; margin: 8px 0; border: 1.5px solid #e2e8f0; border-radius: 14px; font-size: 1rem; outline: none; }
        .btn-primary { width: 100%; background: var(--primary); color: white; padding: 15px; border: none; border-radius: 15px; font-weight: 700; cursor: pointer; margin-top: 10px; }
        .auth-toggle { text-align: center; margin-top: 15px; font-size: 0.9rem; color: #64748b; cursor: pointer; text-decoration: underline; }
        .fab { position: fixed; bottom: 30px; right: 25px; width: 65px; height: 65px; background: var(--primary); color: white; border-radius: 22px; border: none; font-size: 26px; box-shadow: 0 10px 20px rgba(37,99,235,0.4); cursor: pointer; z-index: 1000; }
    </style>
</head>
<body>

<div class="top-bar">
    <div id="userInfo" class="user-chip">👋 မင်္ဂလာပါ ဧည့်သည်</div>
    <button onclick="toggleAuthModal()" id="authBtn" style="border:none; background:none; color:var(--primary); font-weight:800; cursor:pointer;">LOGIN</button>
</div>

<div class="header">
    <h1>⛰️ Taunggyi Hub</h1>
    <div class="leaderboard" id="leaderboard">🏆 Top: Loading...</div>
</div>

<div class="container">
    <div class="tabs">
        <div class="tab active" onclick="switchTab('fuel', this)">⛽ ဆီ</div>
        <div class="tab" onclick="switchTab('lost', this)">🔍 ပျောက်/ကောက်</div>
        <div class="tab" onclick="switchTab('power', this)">💡 မီး</div>
        <div class="tab" onclick="switchTab('emergency', this)">☎️ အရေးပေါ်</div>
    </div>
    <div id="displayArea"></div>
</div>

<button class="fab" onclick="checkAuthAndOpenPost()"><i class="fa fa-plus"></i></button>

<div id="authModal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle">အကောင့်ဝင်ရန်</h3>
        <div id="registerFields" style="display:none;">
            <input type="text" id="username" placeholder="အသုံးပြုမည့်အမည် (Username)">
        </div>
        <input type="email" id="email" placeholder="Gmail လိပ်စာ">
        <input type="password" id="password" placeholder="Password">
        <button class="btn-primary" id="mainAuthBtn" onclick="handleAuth()">ဝင်မည်</button>
        <div class="auth-toggle" id="toggleLink" onclick="switchAuthMode()">အကောင့်မရှိသေးဘူးလား? အသစ်ဖွင့်ရန်</div>
        <button onclick="closeModal('authModal')" style="width:100%; border:none; background:none; color:gray; margin-top:15px;">ပိတ်မည်</button>
    </div>
</div>

<div id="postModal" class="modal">
    <div class="modal-content">
        <h3>သတင်းအသစ်တင်မည်</h3>
        <div id="formFields"></div>
        <button class="btn-primary" onclick="saveData()">တင်မည်</button>
        <button onclick="closeModal('postModal')" style="width:100%; border:none; background:none; color:gray; margin-top:15px;">ပိတ်မည်</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCmsK55PSk5rYMIqvj8Xkadf1tFhkhsKxc",
        authDomain: "taunggyigasstation.firebaseapp.com",
        databaseURL: "https://taunggyigasstation-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "taunggyigasstation",
        storageBucket: "taunggyigasstation.firebasestorage.app",
        messagingSenderId: "206030659711",
        appId: "1:206030659711:web:6c320045e1db2c899a5f4a"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();

    let currentUser = null;
    let currentTab = 'fuel';
    let isRegisterMode = false;

    auth.onAuthStateChanged(user => {
        currentUser = user;
        if (user) {
            db.ref('users/' + user.uid).once('value', snap => {
                document.getElementById('userInfo').innerText = `👤 ${snap.val()?.name || user.email.split('@')[0]}`;
            });
            document.getElementById('authBtn').innerText = "LOGOUT";
        } else {
            document.getElementById('userInfo').innerText = "👋 မင်္ဂလာပါ ဧည့်သည်";
            document.getElementById('authBtn').innerText = "LOGIN";
        }
        loadData(); // Auth ပြောင်းတိုင်း Like Button status တွေ ပြန်စစ်ဖို့
    });

    function switchAuthMode() {
        isRegisterMode = !isRegisterMode;
        document.getElementById('modalTitle').innerText = isRegisterMode ? "အကောင့်သစ်ဖွင့်ရန်" : "အကောင့်ဝင်ရန်";
        document.getElementById('registerFields').style.display = isRegisterMode ? "block" : "none";
        document.getElementById('mainAuthBtn').innerText = isRegisterMode ? "အကောင့်ဖွင့်မည်" : "ဝင်မည်";
        document.getElementById('toggleLink').innerText = isRegisterMode ? "အကောင့်ရှိပြီးသားလား? ပြန်ဝင်ရန်" : "အကောင့်မရှိသေးဘူးလား? အသစ်ဖွင့်ရန်";
    }

    function handleAuth() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        const name = document.getElementById('username').value;
        if (isRegisterMode) {
            auth.createUserWithEmailAndPassword(email, pass).then(cred => {
                db.ref('users/' + cred.user.uid).set({ name: name, email: email, points: 0 });
                closeModal('authModal');
            }).catch(err => alert(err.message));
        } else {
            auth.signInWithEmailAndPassword(email, pass).then(() => closeModal('authModal')).catch(err => alert("Email သို့မဟုတ် Password မှားယွင်းနေပါသည်"));
        }
    }

    function toggleAuthModal() {
        if (currentUser) auth.signOut();
        else { isRegisterMode = false; switchAuthMode(); document.getElementById('authModal').style.display = 'flex'; }
    }

    function checkAuthAndOpenPost() {
        if (!currentUser) return document.getElementById('authModal').style.display = 'flex';
        openPostModal();
    }

    function switchTab(tab, el) {
        currentTab = tab;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        loadData();
    }

    function openPostModal() {
        const fields = document.getElementById('formFields');
        if (currentTab === 'fuel') { fields.innerHTML = `<input id="v1" placeholder="ဆိုင်အမည်"> <select id="v2"><option>ဆီရှိသည် ✅</option><option>ဆီပြတ်နေသည် ❌</option></select>`; }
        else if (currentTab === 'power') { fields.innerHTML = `<input id="v1" placeholder="ရပ်ကွက်အမည်"> <select id="v2"><option>မီးလာနေသည် 💡</option><option>မီးပျက်နေသည် 🌑</option></select>`; }
        else { fields.innerHTML = `<input id="v1" placeholder="ခေါင်းစဉ်"><textarea id="v2" placeholder="အသေးစိတ်" rows="3"></textarea><input id="vImg" placeholder="ပုံ Link (ImgBB)">`; }
        document.getElementById('postModal').style.display = 'flex';
    }

    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    function saveData() {
        const v1 = document.getElementById('v1').value;
        const v2 = document.getElementById('v2').value;
        const vImg = document.getElementById('vImg')?.value || "";
        if(!v1 || !v2) return alert("အချက်အလက်ဖြည့်ပါ");

        db.ref('users/' + currentUser.uid).once('value', snap => {
            const userName = snap.val()?.name || currentUser.email.split('@')[0];
            const postData = { 
                title: v1, status: v2, img: vImg, 
                time: new Date().toLocaleString('en-US', { hour: 'numeric', minute: 'numeric', hour12: true, day: 'numeric', month: 'short' }), 
                timestamp: Date.now(), 
                uid: currentUser.uid, 
                authorName: userName, 
                likes: 0 
            };
            db.ref(currentTab + '/').push(postData);
            closeModal('postModal');
        });
    }

    // Like Spamming ကာကွယ်ထားသော Like Function
    function giveLike(postId, authorUid) {
        if (!currentUser) return document.getElementById('authModal').style.display = 'flex';
        const likeRef = db.ref(`${currentTab}/${postId}/likedBy/${currentUser.uid}`);
        
        likeRef.once('value', snap => {
            if (snap.exists()) {
                // Like ပေးပြီးသားဆိုရင် Unlike လုပ်မယ် (Like ပြန်ဖြုတ်မယ်)
                likeRef.remove();
                db.ref(`${currentTab}/${postId}/likes`).transaction(c => (c || 1) - 1);
                if(authorUid) db.ref('users/' + authorUid + '/points').transaction(p => (p || 0) - 10);
            } else {
                // Like မပေးရသေးရင် Like ပေးမယ်
                likeRef.set(true);
                db.ref(`${currentTab}/${postId}/likes`).transaction(c => (c || 0) + 1);
                if(authorUid) db.ref('users/' + authorUid + '/points').transaction(p => (p || 0) + 10);
            }
        });
    }

    function loadData() {
        const display = document.getElementById('displayArea');
        display.innerHTML = "<p style='text-align:center; padding:40px; opacity:0.5;'>Loading...</p>";
        
        db.ref(currentTab + '/').on('value', snap => {
            display.innerHTML = "";
            let items = [];
            snap.forEach(child => { let d = child.val(); d.id = child.key; items.push(d); });
            items.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));

            items.forEach(d => {
                const name = d.authorName || "ဧည့်သည်";
                const isLiked = d.likedBy && currentUser && d.likedBy[currentUser.uid] ? 'liked' : '';
                display.innerHTML += `
                    <div class="card">
                        <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                            <span style="font-size:0.8rem; color:var(--primary); font-weight:700;">${name}</span>
                            <span style="font-size:0.75rem; color:#94a3b8;">${d.time || ''}</span>
                        </div>
                        <div class="card-title">${d.title}</div>
                        ${d.img ? `<img src="${d.img}" class="post-img" onerror="this.style.display='none'">` : ''}
                        <p style="font-size:0.95rem; color:#475569; margin: 10px 0;">${d.status}</p>
                        <div class="card-actions">
                            <button class="like-btn ${isLiked}" onclick="giveLike('${d.id}', '${d.uid || ''}')">
                                <i class="fa-solid fa-heart"></i> ${d.likes || 0}
                            </button>
                        </div>
                    </div>`;
            });
        });
    }

    // Leaderboard System
    db.ref('users').orderByChild('points').limitToLast(3).on('value', snap => {
        let list = [];
        snap.forEach(u => list.push(u.val()));
        list.reverse();
        let ldrText = "🏆 Top: ";
        list.forEach((u, i) => { if(u.points > 0) ldrText += `${i+1}. ${u.name} (${u.points})  `; });
        document.getElementById('leaderboard').innerText = list.some(u => u.points > 0) ? ldrText : "🏆 သတင်းတင်ပြီး Point ယူပါ";
    });

    window.onload = loadData;
</script>
</body>
</html>
